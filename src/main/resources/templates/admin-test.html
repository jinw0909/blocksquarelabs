<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">

  <title>Inquiry Test</title>

  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<main class="admin-page">
  <section class="admin-card">
    <div class="admin-header">
      <p class="eyebrow">BLOCKSQUARE LABS</p>
      <h1>Inquiry Test</h1>
      <p class="description">문의 메일 전송 테스트 페이지입니다.</p>
    </div>

    <div class="success-box"
         th:if="${param.success}">
      문의가 정상적으로 전송되었습니다.
    </div>

    <form class="inquiry-form"
          th:action="@{/test/inquiry}"
          method="post">

      <div class="form-group">
        <label for="sendTo">수신 이메일</label>
        <input id="sendTo"
               name="sendTo"
               type="email"
               maxlength="100"
               placeholder="example@domain.com"
               required>
      </div>

      <div class="form-group">
        <label for="name">이름</label>
        <input id="name"
               name="name"
               type="text"
               maxlength="50"
               placeholder="이름을 입력하세요"
               required>
      </div>

      <div class="form-group">
        <label for="inquiry">문의 내용</label>
        <textarea id="inquiry"
                  name="inquiry"
                  rows="8"
                  maxlength="2000"
                  placeholder="문의 내용을 입력하세요"
                  required></textarea>
      </div>

      <div class="admin-actions">
        <button class="primary-button" type="submit">
          문의 전송
        </button>

        <a class="secondary-button" th:href="@{/admin}">
          Admin Page로 돌아가기
        </a>
      </div>
    </form>
  </section>
</main>

</body>
</html>
