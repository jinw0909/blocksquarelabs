<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 검색엔진 색인 방지 -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">

    <title>Admin</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<main class="admin-page">
    <section class="admin-card">
        <div class="admin-header">
            <p class="eyebrow">BLOCKSQUARE LABS</p>
            <h1>Admin Page</h1>
            <p class="description">관리자 전용 페이지입니다.</p>
        </div>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">로그인 유저</span>
                <span class="info-value" th:text="${user.username}">username</span>
            </div>

            <div class="info-row">
                <span class="info-label">권한</span>
                <span class="info-value" th:text="${user.authorities}">ROLE</span>
            </div>
        </div>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="secondary-button" type="submit">Logout</button>
        </form>
    </section>
</main>

</body>
</html>
