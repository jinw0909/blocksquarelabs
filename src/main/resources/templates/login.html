<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 검색엔진 색인 방지 -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <link rel="canonical" href="https://www.blocksquarelabs.com/">

    <title>관리자 로그인</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<main class="login-page">
    <section class="login-card">
        <div class="login-header">
            <p class="eyebrow">BLOCKSQUARE LABS</p>
            <h1>관리자 로그인</h1>
            <p class="description">관리자 계정으로 로그인해주세요.</p>
        </div>

        <div class="error-message" th:if="${param.error}">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <div class="logout-message" th:if="${param.logout}">
            정상적으로 로그아웃되었습니다.
        </div>

        <form class="admin-form" method="post" th:action="@{/login}">
            <div class="form-group">
                <label for="username">아이디</label>
                <input
                        id="username"
                        type="text"
                        name="username"
                        autocomplete="username"
                        placeholder="Username"
                        required
                />
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                        id="password"
                        type="password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="Password"
                        required
                />
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <button class="primary-button" type="submit">로그인</button>
        </form>
    </section>
</main>

</body>
</html>
