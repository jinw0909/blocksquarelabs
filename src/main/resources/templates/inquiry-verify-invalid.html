<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 인증 실패</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap/bootstrap.css}">
    <script th:src="@{/js/bootstrap/bootstrap.bundle.js}" defer></script>

    <style>
        body {
            margin: 0;
            min-height: 100svh;
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .page {
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .fail-card {
            width: 100%;
            max-width: 560px;
            padding: 44px 32px;
            border-radius: 24px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(220, 53, 69, 0.16);
            color: #ff8f9a;
            font-size: 28px;
            font-weight: 700;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        p {
            margin: 0;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.7;
        }

        .actions {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .home-link {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 140px;
            padding: 12px 18px;
            border-radius: 999px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .home-link:hover {
            color: #000;
            background: #eee;
        }

        .sub-link {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 140px;
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .sub-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        @media (max-width: 576px) {
            .fail-card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .home-link,
            .sub-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<main class="page">
    <section class="fail-card">
        <div class="icon">!</div>

        <h1>이메일 인증에 실패했습니다.</h1>

        <p>
            링크가 올바르지 않거나 만료된 링크일 수 있습니다.<br>
            문의를 다시 등록하거나, 받은 메일의 링크를 다시 확인해 주세요.
        </p>

        <div class="actions">
            <a href="/" class="home-link">홈으로 이동</a>
            <a href="/#contact" class="sub-link">문의 다시 하기</a>
        </div>
    </section>
</main>

</body>
</html>
