<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>문의 인증 완료</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100svh;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        p {
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            width: 10rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>이메일 인증이 완료되었습니다.</h1>
    <p>
        문의가 정상적으로 접수되었습니다.<br>
        답변이 등록되면 입력하신 이메일로 안내드리겠습니다.
    </p>
    <a href="/">홈으로 이동</a>
</div>
</body>
</html>
